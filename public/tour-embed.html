<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Brodce – virtuální prohlídka</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <style>
    @-ms-viewport { width:device-width; }
    @media only screen and (min-device-width:800px) { html { overflow:hidden; } }
    html { height: 100%; }
    body { height: 100%; overflow: hidden; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; color: #FFFFFF; background-color: #0F2240; }
    #pano { width: 100%; height: 100%; }
  </style>
</head>
<body>
<script src="https://brodce.cz/html/prohlidka/xml/viewer/krpano.js"></script>
<div id="pano">
  <noscript>
    <div style="text-align:center;padding-top:40vh;">JavaScript je potřeba pro virtuální prohlídku.</div>
  </noscript>
  <script>
    // Snížení autorotate rychlosti (default v tour.xml je 3.0)
    var TARGET_SPEED = 1.4;

    embedpano({
      swf: "https://brodce.cz/html/prohlidka/xml/viewer/krpano.swf",
      xml: "https://brodce.cz/html/prohlidka/xml/tour.xml",
      target: "pano",
      html5: "auto",
      mobilescale: 1.0,
      passQueryParameters: true,
      onready: function (krpano) {
        // Skryje vrtulník (návrat na letecký pohled) — máme vlastní UI tlačítko.
        // Layery jsou v XML pojmenované av, av1..av4 (jeden na scénu).
        var HELI_NAMES = ["av", "av1", "av2", "av3", "av4"];
        function hideHeli() {
          for (var i = 0; i < HELI_NAMES.length; i++) {
            krpano.call(
              "set(layer[" + HELI_NAMES[i] + "].visible,false);" +
              "set(layer[" + HELI_NAMES[i] + "].enabled,false)"
            );
          }
        }

        // 1) Speed + skryt vrtulník hned po načtení
        krpano.set("autorotate.speed", TARGET_SPEED);
        hideHeli();

        // 2) Aplikovat i při každém přepnutí scény (XML každé scény jinak resetuje speed=3.0
        //    a každá scéna znova vytvoří heli layer)
        krpano.set("events[customspeed].keep", true);
        var heliCalls = HELI_NAMES.map(function (n) {
          return "set(layer[" + n + "].visible,false);set(layer[" + n + "].enabled,false)";
        }).join(";");
        krpano.set(
          "events[customspeed].onnewscene",
          "set(autorotate.speed, " + TARGET_SPEED + ");" + heliCalls
        );

        // 3) Bezpečnostní override po krátké pauze — některé tour XML aplikují hodnotu opožděně
        setTimeout(function () {
          krpano.set("autorotate.speed", TARGET_SPEED);
          hideHeli();
        }, 800);
      },
    });
  </script>
</div>
</body>
</html>
